name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.0.0" }
      - run: bun install --ignore-scripts
      - run: bun test || true
      - run: bun run build || true
